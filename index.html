<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>【非公式】はっきー's Grand Time ファンサイト</title>
    <meta name="description" content="はっきーの非公式ファンサイトです。最新動画や配信予定、SNSリンクなどをまとめています。">
    <meta name="keywords" content="はっきー, Vtuber, スプラトゥーン, ファンサイト, 非公式">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="【非公式】はっきー's Grand Time ファンサイト">
    <meta property="og:description" content="はっきーの最新情報をお届けする非公式ファンサイトです。">
    <meta property="og:image" content="はっきー.jpg">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="はっきー 非公式ファンサイト">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* 全体設定：参考コードのシンプル＆スタイリッシュな黒調をベースに */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth; /* 滑らかなスクロール */
            background: #0b0c10; /* 深みのある黒 */
            color: #f9fafb;
            font-family: 'Zen Kaku Gothic New', sans-serif;
        }

        body {
            min-height: 100vh;
            line-height: 1.8;
            overflow-x: hidden;
            padding-top: 70px; /* ナビゲーションバーの高さ分 */
        }

        a {
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.3s, color 0.3s;
        }
        a:hover {
            opacity: 0.7;
            color: #a5b4fc;
        }

        /* 固定ナビゲーションバー */
        header.nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            padding: 18px 20px;
        }
        .nav-container a {
            margin: 0 12px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.1em;
        }

        /* ふわっと表示（アニメーション用初期状態） */
        .fade-in-section {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            visibility: hidden;
        }
        .fade-in-section.is-visible {
            opacity: 1;
            transform: none;
            visibility: visible;
        }

        /* セクション共通スタイル */
        section {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        /* 参考コードベースの美しい半透明カード */
        .card {
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            border-left: 4px solid #6366f1; /* スタイリッシュなアクセント線 */
            padding-left: 16px;
            text-align: left;
            letter-spacing: 0.1em;
        }

        /* ホームセクション */
        .main-visual {
            width: 100%;
            max-width: 650px;
            height: auto;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            margin-bottom: 25px;
        }
        .main-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #eef2ff;
            margin-top: 10px;
        }

        /* 動画一覧セクション（他より大きめの指定：マックス幅を広く） */
        #videos {
            max-width: 1100px;
        }
        #videos .card h2 {
            font-size: 2.1rem;
        }
        .video-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }
        .video-block {
            flex: 1;
            min-width: 300px;
            max-width: 460px;
            text-align: left;
        }
        .video-block h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            font-weight: 600;
            color: #9ca3af;
        }
        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, border-color 0.3s;
        }
        .thumbnail-wrapper:hover {
            transform: scale(1.03);
            border-color: rgba(99, 102, 241, 0.5);
        }
        .thumbnail-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* おすすめの配信アーカイブ用：中央寄せ配置用スタイル */
        .archive-block {
            max-width: 600px;
            margin: 0 auto;
            text-align: left;
        }
        .archive-block h3 {
            font-size: 1.1rem;
            margin-bottom: 12px; /* タイトル下（サムネイルとの間）に余白を作る */
            font-weight: 600;
            color: #9ca3af;
        }

        /* 配信予定セクション */
        .quote-schedule {
            margin-top: 20px;
            padding: 24px;
            border-left: 4px solid #a5b4fc;
            background: rgba(255, 255, 255, 0.03);
            color: #eef2ff;
            font-size: 1.2rem;
            font-weight: 700; /* 太文字 */
            text-align: left;
        }

        /* 愉快な仲間たち */
        .friend-img {
            width: 100%;
            max-width: 480px; /* 大きく配置 */
            height: auto;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        .friend-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .friend-link {
            font-size: 0.95rem;
            color: #a5b4fc;
            text-decoration: underline;
            word-break: break-all;
        }

        /* SNSリンク */
        .sns-list {
            list-style: none;
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
        }
        .sns-item {
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 14px;
        }
        .sns-label {
            font-weight: 600;
            font-size: 1.1rem;
            color: #9ca3af;
            margin-bottom: 6px;
        }
        .sns-url {
            font-size: 1rem;
            color: #ffffff;
            text-decoration: underline;
            word-break: break-all;
        }

        /* ページ上部へ戻るボタン */
        #back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: rgba(99, 102, 241, 0.8);
            backdrop-filter: blur(5px);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s, background 0.3s;
            z-index: 999;
            font-size: 1.2rem;
        }
        #back-to-top:hover {
            background: rgba(99, 102, 241, 1);
        }
        #back-to-top.is-visible {
            opacity: 1;
            visibility: visible;
        }

        /* フッター */
        footer {
            text-align: center;
            padding: 60px 20px;
            font-size: 0.85rem;
            color: #6b7280;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.4);
            margin-top: 80px;
        }
        footer p {
            margin-bottom: 8px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        footer a {
            color: #9ca3af;
            text-decoration: underline;
        }

        /* レスポンシブ */
        @media (max-width: 600px) {
            header.nav-bar {
                padding: 10px 0;
            }
            .nav-container a {
                margin: 0 6px;
                font-size: 0.85rem;
            }
            .card {
                padding: 24px;
            }
            .card h2 {
                font-size: 1.5rem;
            }
            #videos .card h2 {
                font-size: 1.7rem;
            }
            .main-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <header class="nav-bar">
        <nav class="nav-container">
            <a href="#home">ホーム</a>
            <a href="#videos">動画一覧</a>
            <a href="#archive
